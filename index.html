<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JAIME Dashboard | Real-Time Trading</title>
<style>
:root {
    --bg: #0d1117;
    --bg-card: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --text-muted: #8b949e;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --blue: #58a6ff;
    --purple: #a371f7;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
}
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }
header {
    text-align: center;
    padding: 40px 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 30px;
}
header h1 {
    font-size: 2.5rem;
    background: linear-gradient(90deg, var(--green), var(--blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
}
.status {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--bg-card);
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 0.9rem;
}
.status-dot {
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s infinite;
}
@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
}
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}
.card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
}
.card h3 {
    color: var(--text-muted);
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
}
.card .value {
    font-size: 2rem;
    font-weight: 700;
}
.card .change {
    font-size: 0.9rem;
    margin-top: 8px;
}
.positive { color: var(--green); }
.negative { color: var(--red); }
.neutral { color: var(--yellow); }
.section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
}
.section h2 {
    font-size: 1.3rem;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
}
table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9rem;
}
th, td {
    padding: 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
}
th {
    color: var(--text-muted);
    font-weight: 500;
    font-size: 0.8rem;
    text-transform: uppercase;
}
tr:hover { background: rgba(255,255,255,0.03); }
.badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: 600;
}
.badge-win { background: rgba(63, 185, 80, 0.15); color: var(--green); }
.badge-loss { background: rgba(248, 81, 73, 0.15); color: var(--red); }
.badge-pending { background: rgba(88, 166, 255, 0.15); color: var(--blue); }
.badge-closed { background: rgba(210, 153, 34, 0.15); color: var(--yellow); }
.chart-container {
    height: 300px;
    position: relative;
}
#equityChart {
    width: 100%;
    height: 100%;
}
.pairs-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
}
.pair-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
}
.pair-card h4 {
    font-size: 1rem;
    margin-bottom: 8px;
}
.params {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    font-size: 0.85rem;
}
.param {
    background: var(--bg);
    padding: 8px 12px;
    border-radius: 6px;
}
.param-label { color: var(--text-muted); font-size: 0.75rem; }
.param-value { font-weight: 600; }
footer {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
    font-size: 0.85rem;
    border-top: 1px solid var(--border);
    margin-top: 40px;
}
.last-update {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 0.8rem;
    color: var(--text-muted);
}
.loading {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
}
.error-msg {
    text-align: center;
    padding: 40px;
    color: var(--red);
}
</style>
</head>
<body>
<div class="container" id="app">
    <div class="loading">🔄 Cargando datos de Jaime...</div>
</div>

<script>
const API = 'https://webhook.leadpilot.es/api/jaime/trackrecord';

function fmtPrice(v) {
    if (v == null) return '-';
    return v < 1 ? '$' + v.toFixed(4) : '$' + v.toFixed(2);
}

function loadData() {
    const app = document.getElementById('app');

    fetch(API + '?_=' + Date.now())
        .then(r => r.json())
        .then(data => {
            const trades = data.history || [];
            const total = data.totalTrades || 0;
            const wins = trades.filter(t => t.result === 'WIN').length;
            const losses = total - wins;
            const wr = data.winRate || 0;
            const pnl = data.pnl || 0;

            // Today
            const today = new Date().toISOString().slice(0, 10);
            const todayTrades = trades.filter(t => (t.timestamp || '').startsWith(today));

            // Equity curve
            const equity = {};
            let cum = 0;
            trades.forEach(t => {
                const day = (t.timestamp || '').slice(0, 10);
                cum += t.pnl || 0;
                equity[day] = Math.round(cum * 10000) / 10000;
            });
            const equityData = Object.entries(equity).sort((a,b) => a[0].localeCompare(b[0])).map(([d,p]) => ({date:d, pnl:p}));

            // Pair stats
            const pairs = {};
            trades.forEach(t => {
                const sym = t.symbol;
                if (!pairs[sym]) pairs[sym] = {trades:0, wins:0, pnl:0};
                pairs[sym].trades++;
                if (t.result === 'WIN') pairs[sym].wins++;
                pairs[sym].pnl += t.pnl || 0;
            });

            // Build HTML
            let rows = '';
            [...trades].reverse().forEach(t => {
                const ts = (t.timestamp || '').slice(0, 16);
                const pnlCls = t.pnl > 0 ? 'positive' : (t.pnl < 0 ? 'negative' : 'neutral');
                const badgeMap = {'WIN':'badge-win','LOSS':'badge-loss','BREAKEVEN':'badge-closed','BE':'badge-closed','CLOSED':'badge-closed'};
                const badgeCls = badgeMap[t.result] || 'badge-pending';
                const pnlStr = t.pnl >= 0 ? '$+' + t.pnl.toFixed(4) : '$' + t.pnl.toFixed(4);
                rows += `<tr>
                    <td>${ts}</td>
                    <td><strong>${t.symbol}</strong></td>
                    <td>${(t.side||'').toUpperCase()}</td>
                    <td>${fmtPrice(t.entry)}</td>
                    <td>${fmtPrice(t.sl)}</td>
                    <td>${fmtPrice(t.tp)}</td>
                    <td>${(t.qty||0).toFixed(2)}</td>
                    <td><span class="badge ${badgeCls}">${t.result}</span></td>
                    <td class="${pnlCls}">${pnlStr}</td>
                </tr>`;
            });

            let pairCards = '';
            Object.entries(pairs).sort((a,b) => b[1].pnl - a[1].pnl).forEach(([sym, st]) => {
                const pwr = st.trades > 0 ? (st.wins / st.trades * 100).toFixed(1) : 0;
                const wrCls = pwr >= 50 ? 'positive' : 'negative';
                const pnlCls = st.pnl >= 0 ? 'positive' : 'negative';
                const pnlStr = st.pnl >= 0 ? '$+' + st.pnl.toFixed(4) : '$' + st.pnl.toFixed(4);
                pairCards += `<div class="pair-card">
                    <h4>${sym}</h4>
                    <p>Trades: ${st.trades} | WR: <span class="${wrCls}">${pwr}%</span></p>
                    <p class="${pnlCls}">P&amp;L: ${pnlStr}</p>
                </div>`;
            });

            app.innerHTML = `
<div style="width:100%;max-width:900px;margin:0 auto 20px;border-radius:12px;overflow:hidden;border:1px solid var(--border);">
    <img src="intro.gif" style="width:100%;display:block;" alt="JAIME Dashboard Intro">
</div>
<header>
    <h1>🐾 JAIME Dashboard</h1>
    <p style="color: var(--text-muted); margin-top: 10px;">Autonomous Trading Engine | Bybit Mainnet</p>
    <div class="status" style="margin-top: 15px;">
        <span class="status-dot"></span>
        <span>Live Mode Active</span>
    </div>
</header>

<div class="grid">
    <div class="card">
        <h3>Balance Bybit</h3>
        <div class="value">$10.26</div>
        <div class="change neutral">USDT disponible</div>
    </div>
    <div class="card">
        <h3>P&L Total</h3>
        <div class="value ${pnl >= 0 ? 'positive' : 'negative'}">${pnl >= 0 ? '$+' : '$'}${pnl.toFixed(4)}</div>
        <div class="change">Trades ejecutados</div>
    </div>
    <div class="card">
        <h3>Win Rate</h3>
        <div class="value ${wr >= 50 ? 'positive' : 'negative'}">${wr}%</div>
        <div class="change">${wins}W / ${losses}L</div>
    </div>
    <div class="card">
        <h3>Trades Hoy</h3>
        <div class="value">${todayTrades.length}</div>
        <div class="change">Límite: 1/día</div>
    </div>
</div>

<div class="section">
    <h2>📈 Equity Curve</h2>
    <div class="chart-container">
        <canvas id="equityChart"></canvas>
    </div>
</div>

<div class="section">
    <h2>📝 Trade History</h2>
    <table>
        <thead>
            <tr><th>Fecha</th><th>Par</th><th>Side</th><th>Entry</th><th>SL</th><th>TP</th><th>Qty</th><th>Result</th><th>P&L</th></tr>
        </thead>
        <tbody>${rows}</tbody>
    </table>
</div>

<div class="section">
    <h2>📊 Performance por Par</h2>
    <div class="pairs-grid">${pairCards}</div>
</div>

<footer>
    <p>JAIME Trading Engine v2.0 | Auto-generated</p>
    <p style="margin-top: 5px;">Updates in real-time via live API</p>
</footer>
</div>

<div class="last-update">
    🔄 Last update: ${data.updatedAt || 'just now'}
</div>`;

            // Draw equity chart
            if (equityData.length > 0) {
                setTimeout(() => drawChart(equityData), 100);
            }
        })
        .catch(err => {
            app.innerHTML = '<div class="error-msg">❌ Error cargando datos: ' + err.message + '</div>';
        });
}

function drawChart(equityData) {
    const canvas = document.getElementById('equityChart');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.parentElement.offsetWidth;
    canvas.height = canvas.parentElement.offsetHeight;

    const w = canvas.width, h = canvas.height, pad = 40;
    const pnls = equityData.map(d => d.pnl);
    const minPnl = Math.min(...pnls, 0);
    const maxPnl = Math.max(...pnls, 0);
    const range = maxPnl - minPnl || 1;

    ctx.clearRect(0, 0, w, h);

    ctx.strokeStyle = '#30363d';
    ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
        const y = pad + (h - 2 * pad) * i / 4;
        ctx.beginPath();
        ctx.moveTo(pad, y);
        ctx.lineTo(w - pad, y);
        ctx.stroke();
    }

    const zeroY = pad + (maxPnl / range) * (h - 2 * pad);
    ctx.strokeStyle = '#8b949e';
    ctx.setLineDash([5, 5]);
    ctx.beginPath();
    ctx.moveTo(pad, zeroY);
    ctx.lineTo(w - pad, zeroY);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.strokeStyle = equityData[equityData.length-1].pnl >= 0 ? '#3fb950' : '#f85149';
    ctx.lineWidth = 3;
    ctx.beginPath();
    equityData.forEach((d, i) => {
        const x = pad + (w - 2 * pad) * i / (equityData.length - 1 || 1);
        const y = pad + ((maxPnl - d.pnl) / range) * (h - 2 * pad);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    });
    ctx.stroke();

    equityData.forEach((d, i) => {
        const x = pad + (w - 2 * pad) * i / (equityData.length - 1 || 1);
        const y = pad + ((maxPnl - d.pnl) / range) * (h - 2 * pad);
        ctx.fillStyle = d.pnl >= 0 ? '#3fb950' : '#f85149';
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fill();
    });

    ctx.fillStyle = '#8b949e';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'right';
    for (let i = 0; i <= 4; i++) {
        const val = maxPnl - (range * i / 4);
        const y = pad + (h - 2 * pad) * i / 4;
        ctx.fillText('$' + val.toFixed(2), pad - 10, y + 4);
    }
}

// Load on page load, reload every 60s
loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
